<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalLedger - Dark Fintech</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #09090b;
            --bg-surface: rgba(24, 24, 27, 0.7);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #06b6d4; /* Cyan */
            --primary-glow: rgba(6, 182, 212, 0.3);
            --border: rgba(255, 255, 255, 0.1);
            --radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-body); 
            background-image: radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Glassmorphism Sidebar */
        aside { 
            width: 260px; 
            background: var(--bg-surface); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 32px 24px; 
        }
        .logo { font-size: 1.5rem; font-weight: 600; margin-bottom: 48px; display: flex; align-items: center; gap: 12px; letter-spacing: 0.5px;}
        .logo svg { width: 24px; height: 24px; fill: none; stroke: var(--primary); stroke-width: 2; }
        nav { display: flex; flex-direction: column; gap: 4px; }
        nav a { 
            text-decoration: none; 
            color: var(--text-muted); 
            padding: 12px 16px; 
            border-radius: 10px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        nav a:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        nav a.active { 
            color: var(--primary); 
            background: rgba(6, 182, 212, 0.1); 
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 0 15px var(--primary-glow);
        }
        
        /* Main Content */
        main { flex: 1; padding: 48px; overflow-y: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { font-size: 2rem; font-weight: 500; }
        .btn-primary { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-family: inherit; 
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--primary-glow); filter: brightness(1.1); }
        
        /* Glass Card / Table */
        .card { 
            background: var(--bg-surface); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius); 
            border: 1px solid var(--border); 
            overflow: hidden; 
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 20px 24px; font-size: 0.85rem; color: var(--text-muted); font-weight: 400; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 1px;}
        td { padding: 20px 24px; border-bottom: 1px solid var(--border); font-size: 1rem; font-weight: 300;}
        tr:last-child td { border-bottom: none; }
        tr { transition: background 0.2s; cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.03); }
        
        .amount.pos { color: #34d399; }
        .amount.neg { color: #f87171; }
        
        .badge-worm { display: inline-block; padding: 6px 12px; border-radius: 20px; background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52,211,153,0.3); color: #34d399; font-size: 0.75rem; }
        .badge-draft { display: inline-block; padding: 6px 12px; border-radius: 20px; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251,191,36,0.3); color: #fbbf24; font-size: 0.75rem; }
        
        /* Animation */
        tbody tr { animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; transform: translateY(10px); }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        tbody tr:nth-child(1) { animation-delay: 0.1s; }
        tbody tr:nth-child(2) { animation-delay: 0.2s; }
        tbody tr:nth-child(3) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            LocalLedger
        </div>
        <nav>
            <a href="#">Dashboard</a>
            <a href="#" class="active">Verifikationer</a>
            <a href="#">Audit Log</a>
            <a href="#">Inställningar</a>
        </nav>
    </aside>
    <main>
        <header>
            <h1>Ledger Entries</h1>
            <button class="btn-primary">Ny Verifikation</button>
        </header>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Datum</th>
                        <th>Beskrivning</th>
                        <th>Omsättning</th>
                        <th>Integritet</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>V-003</td>
                        <td>2026-03-15</td>
                        <td>Inköp Kontorsmaterial</td>
                        <td class="amount neg">- 1 250 kr</td>
                        <td><span class="badge-draft">Unsealed</span></td>
                    </tr>
                    <tr>
                        <td>V-002</td>
                        <td>2026-02-10</td>
                        <td>Konsultarvode</td>
                        <td class="amount pos">+ 25 000 kr</td>
                        <td><span class="badge-worm">WORM Secured</span></td>
                    </tr>
                    <tr>
                        <td>V-001</td>
                        <td>2026-01-01</td>
                        <td>Ingående Balans</td>
                        <td class="amount">0 kr</td>
                        <td><span class="badge-worm">WORM Secured</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
