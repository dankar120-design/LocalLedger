<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalLedger - Light Minimal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        aside { width: 260px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; }
        .logo { font-size: 1.25rem; font-weight: 700; margin-bottom: 40px; display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; }
        nav { display: flex; flex-direction: column; gap: 8px; }
        nav a { text-decoration: none; color: var(--text-muted); font-weight: 500; padding: 10px 16px; border-radius: 8px; transition: all 0.2s; }
        nav a:hover, nav a.active { background: #eff6ff; color: var(--primary); }
        
        /* Main Content */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        h1 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.02em; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: background 0.2s; font-family: inherit; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        /* Card / Table */
        .card { background: var(--bg-surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 16px 24px; font-size: 0.875rem; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); background: #f8fafc; }
        td { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }
        
        .badge-worm { display: inline-block; padding: 4px 8px; border-radius: 4px; background: #dcfce7; color: #166534; font-size: 0.75rem; font-weight: 600; }
        .badge-draft { display: inline-block; padding: 4px 8px; border-radius: 4px; background: #fef9c3; color: #854d0e; font-size: 0.75rem; font-weight: 600; }
        
        /* Animation */
        tbody tr { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
        tbody tr:nth-child(1) { animation-delay: 0.1s; }
        tbody tr:nth-child(2) { animation-delay: 0.2s; }
        tbody tr:nth-child(3) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <aside>
        <div class="logo"><div class="logo-dot"></div> LocalLedger</div>
        <nav>
            <a href="#">Översikt</a>
            <a href="#" class="active">Verifikationer</a>
            <a href="#">Moms & Bokslut</a>
            <a href="#">Inställningar</a>
        </nav>
    </aside>
    <main>
        <header>
            <h1>Verifikationer</h1>
            <button class="btn-primary">+ Ny Verifikation</button>
        </header>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Datum</th>
                        <th>Beskrivning</th>
                        <th>Omsättning</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>V-003</td>
                        <td>2026-03-15</td>
                        <td>Inköp Kontorsmaterial</td>
                        <td>- 1 250 kr</td>
                        <td><span class="badge-draft">UTKAST</span></td>
                    </tr>
                    <tr>
                        <td>V-002</td>
                        <td>2026-02-10</td>
                        <td>Konsultarvode</td>
                        <td>+ 25 000 kr</td>
                        <td><span class="badge-worm">WORM LÅST</span></td>
                    </tr>
                    <tr>
                        <td>V-001</td>
                        <td>2026-01-01</td>
                        <td>Ingående Balans</td>
                        <td>0 kr</td>
                        <td><span class="badge-worm">WORM LÅST</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
